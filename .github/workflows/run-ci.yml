name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  issue_comment:
    types: [created]

jobs:
  run-ci:
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'issue_comment' || (
        github.event.issue.pull_request != null &&
        github.event.comment.body == '/run-ci'
      )

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'issue_comment' && github.event.issue.pull_request.head.sha || github.sha }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Run RSpec
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RACK_ENV: test
        run: bundle exec rspec

      - name: Cache RuboCop
        uses: actions/cache@v4
        with:
          path: ~/.cache/rubocop_cache
          key: rubocop-${{ runner.os }}-${{ hashFiles('.rubocop.yml', 'Gemfile.lock') }}
          restore-keys: rubocop-${{ runner.os }}-

      - name: Run RuboCop
        run: bundle exec rubocop --cache true

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to Render
        run: |
          curl -fsSL \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys"
