plugins:
  - rubocop-rspec

AllCops:
  NewCops: enable
  SuggestExtensions: false
  TargetRubyVersion: 3.3
  Exclude:
    - 'bin/**/*'
    - 'db/migrate/*.rb'
    - 'vendor/**/*'

RSpec/MultipleExpectations:
  Enabled: false

RSpec/ExampleLength:
  Max: 12

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: true
  EnforcedStyle: always
